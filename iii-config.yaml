# Configuración del motor III (runtime de Motia) para data-sentinel.
# Sin este archivo, III usa "default modules" y no carga tus steps de Python.
# Ejecutar desde la raíz del proyecto: iii -c iii-config.yaml

modules:
  - class: modules::stream::StreamModule
    config:
      port: ${STREAM_PORT:3112}
      host: 0.0.0.0
      adapter:
        class: modules::stream::adapters::KvStore
        config:
          store_method: file_based
          file_path: ./data/stream_store

  - class: modules::kv_server::KvServer
    config:
      store_method: file_based
      file_path: ./data/kv_store
      save_interval_ms: 5000

  - class: modules::state::StateModule
    config:
      adapter:
        class: modules::state::adapters::KvStore
        config:
          store_method: file_based
          file_path: ./data/state_store.db

  - class: modules::api::RestApiModule
    config:
      port: 3111
      host: 0.0.0.0
      default_timeout: 30000
      concurrency_request_limit: 1024
      cors:
        allowed_origins:
          - "*"
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  

  - class: modules::queue::QueueModule
    config:
      adapter:
        class: modules::queue::BuiltinQueueAdapter
        config:
          store_method: file_based
          file_path: ./data/queue_store

  - class: modules::pubsub::PubSubModule
    config:
      adapter:
        class: modules::pubsub::LocalAdapter

  - class: modules::cron::CronModule
    config:
      adapter:
        class: modules::cron::KvCronAdapter

  # Este módulo ejecuta tu aplicación Motia (Python) y registra los steps desde src/
  - class: modules::shell::ExecModule
    config:
      watch:
        - src/**/*.py
      exec:
        # Descubre y registra steps en src/ (ingestor_step, validator_step, etc.)
        # Si no usas uv, cambia a: python -m motia run --dir src
        - uv run motia run --dir src
