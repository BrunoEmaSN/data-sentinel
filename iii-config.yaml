# III engine configuration (Motia runtime) for data-sentinel.
# Without this file, III uses "default modules" and does not load your Python steps.
# Run from project root: iii -c iii-config.yaml
#
# Optional environment variables:
#   SENTINEL_API_PORT    — REST API port (default 3111)
#   STREAM_PORT          — Stream port (default 3112)
#   SENTINEL_DATA_DIR    — base directory for stores (default ./data)

modules:
  - class: modules::stream::StreamModule
    config:
      port: ${STREAM_PORT:3112}
      host: 0.0.0.0
      adapter:
        class: modules::stream::adapters::KvStore
        config:
          store_method: file_based
          file_path: ${SENTINEL_DATA_DIR:./data}/stream_store

  - class: modules::kv_server::KvServer
    config:
      store_method: file_based
      file_path: ${SENTINEL_DATA_DIR:./data}/kv_store
      save_interval_ms: 5000

  - class: modules::state::StateModule
    config:
      adapter:
        class: modules::state::adapters::KvStore
        config:
          store_method: file_based
          file_path: ${SENTINEL_DATA_DIR:./data}/state_store.db

  - class: modules::api::RestApiModule
    config:
      port: ${SENTINEL_API_PORT:3111}
      host: 0.0.0.0
      default_timeout: 30000
      concurrency_request_limit: 1024
      cors:
        allowed_origins:
          - "*"
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  

  - class: modules::queue::QueueModule
    config:
      adapter:
        class: modules::queue::BuiltinQueueAdapter
        config:
          store_method: file_based
          file_path: ${SENTINEL_DATA_DIR:./data}/queue_store

  - class: modules::pubsub::PubSubModule
    config:
      adapter:
        class: modules::pubsub::LocalAdapter

  - class: modules::cron::CronModule
    config:
      adapter:
        class: modules::cron::KvCronAdapter

  # This module runs your Motia (Python) app and registers steps from src/
  - class: modules::shell::ExecModule
    config:
      watch:
        - src/**/*.py
      exec:
        # Discovers and registers steps in src/ (ingestor_step, validator_step, etc.)
        # If you don't use uv, change to: python -m motia run --dir src
        - uv run motia run --dir src
